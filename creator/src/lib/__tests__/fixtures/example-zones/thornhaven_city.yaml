            next: farewell

      # ─── The World ──────────────────────────────────────────────────────
      about_world:
        text: "Eryndal is composed of twenty distinct zones — from the Crossroads Path where most travellers arrive, through Thornhaven City where we stand now, into the Thornwood Forest, the Farmer Fields, the Goblin Warrens, the Dark Barrows, the Sea Cliffs, the Sunken Temple, and far beyond to the Celestial Peak where the Elder Dragon waits. Each zone is defined in its own manuscript — what the scholars call 'YAML files' — describing every room, mob, item, shop, quest, trainer, and gathering node. New zones can be added without touching the machinery of the world itself. Simply write the manuscript and the world absorbs it on next awakening."
        choices:
          - text: "Tell me about the zones in more detail."
            next: about_zones
          - text: "How do quests and achievements work?"
            next: about_quests
          - text: "What about the living world — time, weather, seasons?"
            next: about_living_world
          - text: "Back to the main topics."
            next: root

      about_zones:
        text: "There are twenty zones in the world today. Crossroads Path is where most journeys begin. Thornhaven City is the hub — shops, banks, trainers, guilds, the auction house, the arena. Beyond the walls you'll find the Thornwood Forest, Farmer Fields, Cobblestone Road, Highland Trails, Old Mines, the Marsh of Fog, and the Goblin Warrens. Deeper still lie the Dark Barrows, Sea Cliffs, Sunken Temple, Ruined Fortress, Shadowmere Fen, the Thornhaven Sewers beneath our feet, the Haunted Manor, the Barrens Wastes, the Frost Caverns, the Celestial Peak, and the procedural Dungeon of Echoes. Cross-zone exits link them together seamlessly. Each zone has its own lifespan — a reset timer that restores mobs and items periodically."
        choices:
          - text: "Tell me about the Dungeon of Echoes."
            next: about_dungeons
          - text: "Back to the main topics."
            next: root

      about_dungeons:
        text: "The Dungeon of Echoes is a procedural labyrinth — no two runs are alike. It generates a random layout of rooms, populates them with level-scaled mobs, and places a boss at the end. There are multiple difficulty tiers: standard and hard, each with different loot tables. Your whole party enters together — mobs scale to the average party level. Kill the boss to complete the run and earn rewards. Dungeon templates are defined in YAML too, so new dungeons can be added just by writing a template with room themes, mob pools, boss definitions, and loot tables."
        choices:
          - text: "Tell me about quests and achievements."
            next: about_quests
          - text: "Back to the main topics."
            next: root

      about_quests:
        text: "Quests are given by NPCs through dialogue — talk to them, choose the right option, and you'll receive objectives. Kill mobs, collect items, visit locations, complete dungeons — all trackable through your quest log. Achievements are broader milestones: kill a hundred goblins, reach level ten, complete a dungeon with a full party, craft your first item. There are over thirty achievements across categories — combat, exploration, social, crafting. Completing them earns XP, gold, and sometimes titles you can display."
        choices:
          - text: "What about the living world — time, weather, seasons?"
            next: about_living_world
          - text: "Back to the main topics."
            next: root

      about_living_world:
        text: "Eryndal has a day-night cycle — dawn, morning, afternoon, dusk, evening, and night — each with its own ambient feel. Weather shifts dynamically per zone: clear skies, clouds, rain, storms, fog, snow. And the world observes seasonal events tied to real dates — festivals, gatherings, special world flags that change NPC behavior or open hidden areas. All of this is configurable: the length of a day, weather transition probabilities, event dates and durations. The 'time' command shows you the current state of the world."
        choices:
          - text: "Back to the main topics."
            next: root

      # ─── Combat ─────────────────────────────────────────────────────────
      about_combat:
        text: "Combat in Eryndal is real-time and tick-based. The world heartbeat pulses every hundred milliseconds — ten times per second. When you engage a foe, damage is calculated each round using your attributes, equipment, and abilities. There's a dodge mechanic based on your stats, armor reduces incoming damage, and a threat system determines who the mob attacks in a group. Status effects layer on top: damage over time, healing over time, stuns, roots, shields, stat buffs and debuffs. Each effect ticks independently."
        choices:
          - text: "Tell me about the threat system."
            next: about_threat
          - text: "How do status effects work?"
            next: about_status_effects
          - text: "What about groups and parties?"
            next: about_groups
          - text: "Back to the main topics."
            next: root

      about_threat:
        text: "Every mob maintains a threat table — an invisible ledger of who has angered it and by how much. Dealing damage adds threat. Healing a party member adds threat. Some abilities generate extra threat, others reduce it. The mob always attacks whoever sits at the top of its threat table. Warriors can taunt to seize aggro; rogues can fade to shed it. In a well-coordinated party, the warrior holds the mob's attention while others deal damage and heal from safety. If the highest-threat player flees, the mob switches to the next on the list."
        choices:
          - text: "What about groups and parties?"
            next: about_groups
          - text: "Back to the main topics."
            next: root

      about_status_effects:
        text: "Status effects are the hidden language of combat. A poison is a damage-over-time effect that ticks every few seconds. A regeneration blessing heals over time. A stun locks you in place — you can't act, you can't flee. A root pins your feet but leaves your hands free to fight. Shields absorb incoming damage until they break. Buffs raise your stats; debuffs lower them. Effects stack, expire, and interact. A cleric's dispel can strip a poison. A mage's frost can root a fleeing enemy. Over a hundred abilities in the system use these building blocks in different combinations."
        choices:
          - text: "Tell me about the ability system."
            next: about_abilities
          - text: "Back to the main topics."
            next: root

      about_groups:
        text: "Adventuring parties hold up to five members. Invite others with 'group invite', and they accept to join. XP is shared among the group with a bonus per member — the more you bring, the better the reward per kill. Groups are essential for dungeons, where mobs scale to the average party level. Communication is easy: 'gtell' sends a message to your group only. If someone falls, the rest carry on — or flee together. The party leader can kick members or disband the group."
        choices:
          - text: "Tell me about guilds."
            next: about_guilds
          - text: "Back to the main topics."
            next: root

      # ─── Classes and Abilities ──────────────────────────────────────────
      about_classes:
        text: "There are five classes in Eryndal: Warrior, Mage, Cleric, Rogue, and Ranger. Each has its own ability tree — over a hundred abilities total across all classes. Warriors wield steel and fury. Mages command arcane destruction. Clerics channel divine healing and protection. Rogues strike from shadows with precision. Rangers blend nature magic with ranged combat. You choose your class at character creation, but the path doesn't end there."
        choices:
          - text: "How do I learn abilities?"
            next: about_training
          - text: "Tell me about multi-classing."
            next: about_multiclass
          - text: "How does the ability system work under the surface?"
            next: about_abilities
          - text: "Back to the main topics."
            next: root

      about_training:
        text: "Abilities are learned from class trainers — like Captain Varek for warriors, or Archmage Solen for mages, right here in Thornhaven's Trainers' Hall. You spend skill points to learn them. You earn one skill point every two levels. Visit your trainer and type 'train list' to see what's available at your current level. 'train learn <ability>' to spend the point. Choose wisely — your points are limited, and each ability shapes how you fight."
        choices:
          - text: "Tell me about multi-classing."
            next: about_multiclass
          - text: "Back to the main topics."
            next: root

      about_multiclass:
        text: "At level ten, a new path opens. You can visit any other class trainer and type 'train unlock' to take on a second class — for a gold cost. Once unlocked, that trainer's ability list becomes available to you. You'll still earn skill points at the same rate, so you must choose how to divide them. A warrior who unlocks cleric can learn healing. A mage who unlocks rogue can learn stealth. The combinations are yours to discover. But remember: breadth costs depth. A focused specialist will outperform a dilettante."
        choices:
          - text: "How does the ability system work under the surface?"
            next: about_abilities
          - text: "Back to the main topics."
            next: root

      about_abilities:
        text: "Every ability is defined as pure data — name, mana cost, cooldown, damage formula, status effects applied, class restriction, level requirement. The engine reads these definitions and translates them into action. Abilities can deal direct damage, apply status effects, heal, summon pets, generate threat, or combine several of these. Cooldowns are tracked per player. Mana is consumed on cast. The system is entirely data-driven: adding a new spell means writing a configuration entry, not changing the engine's code. There are over a hundred abilities defined today, and the system can absorb more without limit."
        choices:
          - text: "Tell me about pets."
            next: about_pets
          - text: "Back to the main topics."
            next: root

      about_pets:
        text: "Certain abilities summon companions — pets that follow you between rooms and fight at your side. A ranger's hawk, a mage's familiar. Pets are session-bound: they exist while you're connected and vanish when you leave. They scale to your level, attack your current target, and can be named with 'pet name'. Pet templates are defined in the configuration alongside abilities — the summon ability references a template, and the engine brings it to life."
        choices:
          - text: "Back to the main topics."
            next: root

      # ─── Guilds and Social ──────────────────────────────────────────────
      about_guilds:
        text: "Guilds are player-created organizations with a hierarchy of ranks. Found one with 'guild create', invite members, promote or demote officers. Each guild has a message of the day, a roster, and a private chat channel via 'gchat'. Guild data persists independently — in YAML files or a PostgreSQL database, depending on the world's configuration. The guild registrar Edda handles the paperwork right here in Thornhaven."
        choices:
          - text: "What about friends and mail?"
            next: about_friends
          - text: "Tell me about the economy."
            next: about_economy
          - text: "Back to the main topics."
            next: root

      about_friends:
        text: "You can maintain a friends list — 'friend add <name>' to remember someone, 'friend list' to see who's online. And if a friend is away, the post office handles mail. Send letters with 'mail send <player> <message>' and they'll be waiting when the recipient returns. Mail persists across sessions. It's a small thing, but it keeps the world feeling connected even when your companions aren't here."
        choices:
          - text: "Tell me about the economy."
            next: about_economy
          - text: "Back to the main topics."
            next: root

      about_economy:
        text: "Gold flows through Eryndal in many ways. Mobs drop it. Quests reward it. You spend it in shops, at trainers, and on guild creation. The bank stores it safely — Banker Theron holds your deposits. The auction house lets players trade items for gold on the open market. Direct player-to-player trading is supported too, with a confirmation flow so nobody gets cheated. And there's crafting: gather materials, combine them at stations, and sell the results. Enchanting adds magical properties to items for additional value. The whole economy is configurable — item prices, gold drop ranges, bank rules — all tunable without changing the engine."
        choices:
          - text: "Tell me about crafting in detail."
            next: about_crafting
          - text: "What about player housing?"
            next: about_housing
          - text: "Back to the main topics."
            next: root

      about_crafting:
        text: "Crafting starts with gathering. Nodes are scattered across zones — ore veins, herb patches, timber stands. Gather materials, then bring them to the right station: the forge for metalwork, the alchemy lab for potions, the workbench for leather and cloth. Recipes define what you can make. Your crafting skill improves with each attempt. You can specialize in a discipline for bonus quality. Rare yields and recipe discovery add excitement. And enchanting layers on top: use an enchanting table to imbue items with stat bonuses. All recipes, stations, and enchantments are defined in configuration files."
        choices:
          - text: "What about factions and reputation?"
            next: about_factions
          - text: "Back to the main topics."
            next: root

      about_factions:
        text: "The world's factions remember how you treat them. Kill their enemies, complete their quests, and your standing rises — from Hated through Hostile, Unfriendly, Neutral, Friendly, Honored, to Revered. Kill their members and it drops. Some factions are natural enemies: raising standing with one lowers it with another. Faction definitions, relationships, and mob affiliations are all configured in YAML. The 'reputation' command shows where you stand."
        choices:
          - text: "Back to the main topics."
            next: root

      about_housing:
        text: "Player housing gives you a personal room in the world. Expand it, furnish it, describe it however you like. A vault stores items with a capacity limit. You control access — invite friends, lock the door, kick unwanted visitors. Housing state persists with your character. It's your corner of Eryndal."
        choices:
          - text: "Back to the main topics."
            next: root

      # ─── Architecture ───────────────────────────────────────────────────
      about_architecture:
        text: "Ah — you want to look behind the curtain. Very well. The world runs on what the old texts call a 'tick-based event loop.' Ten times per second, the engine processes everything: commands, combat rounds, mob AI, status effect ticks, regen, weather transitions, quest checks. All of it runs on a single thread — deliberately. One thread means no race conditions, no locks, no synchronization bugs. The engine is deterministic: given the same inputs, it produces the same outputs every time. This is the core principle — keep the heart simple and correct."
        choices:
          - text: "How do transports work — telnet and web?"
            next: about_transports
          - text: "Tell me about the event bus system."
            next: about_event_bus
          - text: "How does persistence work?"
            next: about_persistence
          - text: "What about the GMCP protocol?"
            next: about_gmcp
          - text: "Tell me about deployment modes."
            next: about_deployment
          - text: "Back to the main topics."
            next: root

      about_transports:
        text: "The world accepts visitors through two gates: telnet and WebSocket. Telnet is the classic MUD interface — text in, text out, with protocol negotiation for terminal size, type, and GMCP structured data. The telnet transport uses JDK 21 virtual threads, so thousands of connections cost almost nothing in system resources. WebSocket powers the browser client — a PixiJS canvas with React panels, battle scenes, spell targeting, and a quickbar. Both transports produce the same internal events. The engine doesn't know or care which gate you entered through."
        choices:
          - text: "Tell me about the event bus system."
            next: about_event_bus
          - text: "What about GMCP?"
            next: about_gmcp
          - text: "Back to the main topics."
            next: root

      about_event_bus:
        text: "Transports and engine communicate through an event bus — an abstraction layer with interchangeable implementations. InboundEvents flow from transport to engine: a player connected, a line was typed, a GMCP packet arrived. OutboundEvents flow back: text to display, prompts, GMCP data, disconnect commands. In single-process mode, these are simple in-memory channels. In distributed mode, they can be Redis pub/sub streams or gRPC bidirectional streams. The engine code is identical regardless — it reads from InboundBus and writes to OutboundBus without knowing what's underneath."
        choices:
          - text: "How does persistence work?"
            next: about_persistence
          - text: "Tell me about deployment modes."
            next: about_deployment
          - text: "Back to the main topics."
            next: root

      about_persistence:
        text: "Player data flows through a layered chain. At the top sits a write-coalescing layer — it batches rapid changes so the engine doesn't write to storage on every tick. Below that, an optional Redis cache provides fast reads for frequently accessed data. At the bottom, the durable store: either YAML flat files — one per player, with atomic writes — or a PostgreSQL database with Flyway-managed migrations. The backend is selectable at startup with a single configuration flag. Guild data follows the same pattern. The engine never touches storage directly — it works through a repository interface, and the layers beneath are invisible to it."
        choices:
          - text: "Tell me about deployment modes."
            next: about_deployment
          - text: "What about metrics and observability?"
            next: about_metrics
          - text: "Back to the main topics."
            next: root

      about_gmcp:
        text: "GMCP — the Generic MUD Communication Protocol — is how the world sends structured data to smart clients. Over twenty-five package families flow over both telnet and WebSocket: character stats, room info, inventory, equipment, skill lists, quest updates, group status, guild data, auction listings, weather, time of day, combat events, map data, and more. The browser client uses GMCP to populate every panel you see — health bars, maps, skill buttons. It's all machine-readable JSON beneath the surface. Adding a new GMCP package means defining the data shape and registering it — no transport changes needed."
        choices:
          - text: "Tell me about the event bus system."
            next: about_event_bus
          - text: "Back to the main topics."
            next: root

      about_deployment:
        text: "The world can run in three modes. Standalone is the simplest — everything in one process, no dependencies beyond the JVM. Engine mode runs the authoritative game loop with a gRPC server; Gateway mode runs the transports with a gRPC client that connects to one or more engines. In split mode, you can run many gateways pointing at the same engine — scaling connection handling independently of game logic. And then there's zone-based sharding."
        choices:
          - text: "Tell me about zone sharding."
            next: about_sharding
          - text: "How does the gRPC layer work?"
            next: about_grpc
          - text: "Back to the main topics."
            next: root

      about_sharding:
        text: "Zone-based sharding partitions the game world across multiple engine processes. Each engine owns a set of zones and is authoritative for the mobs, items, and players within them. A zone registry — static or Redis-backed — maps zones to engines. When a player walks through a cross-zone exit, a handoff protocol transfers their serialized state to the destination engine with an ACK-based timeout and rollback on failure. Cross-zone commands like 'tell', 'gossip', and 'who' route through an inter-engine message bus. A Redis player location index enables O(1) routing for targeted messages. Gateways connect to multiple engines and redirect sessions transparently. Hot zones can even be instanced — layered copies with load-balanced selection and auto-scaling based on capacity thresholds."
        choices:
          - text: "What about the production infrastructure?"
            next: about_infrastructure
          - text: "Back to the main topics."
            next: root

      about_grpc:
        text: "The gRPC layer is the bridge between gateways and engines. Bidirectional streaming carries inbound and outbound events with the same semantics as the local bus — Connected, Disconnected, LineReceived, SendText, SendPrompt, and all the rest. Protobuf definitions in the source describe every event type. Session IDs are globally unique via a Snowflake-style allocator, and gateway IDs are leased to prevent collisions. Gateways reconnect with exponential backoff if an engine goes down. The mapping between proto messages and internal events lives in a single ProtoMapper file."
        choices:
          - text: "Tell me about zone sharding."
            next: about_sharding
          - text: "Back to the main topics."
            next: root

      about_infrastructure:
        text: "The production infrastructure runs on AWS ECS Fargate, defined entirely as code using CDK. A single deployment command provisions everything: VPC, RDS PostgreSQL, ElastiCache Redis, EFS for world mutations, Network Load Balancer for telnet, Application Load Balancer for WebSocket, Cloud Map service discovery, Fargate services with auto-scaling, CloudWatch alarms, and optional Route 53 DNS with TLS certificates. The whole stack is parameterized by topology — standalone versus engine-gateway split — and by tier: hobby at roughly four to five dollars a month, moderate, or full production with high availability. Docker containers auto-populate their engine identity from the ECS task hostname."
        choices:
          - text: "Back to the main topics."
            next: root

      about_metrics:
        text: "The world exposes its vital signs through Prometheus metrics — over fifty gauges and counters covering engine tick duration, combat rounds per second, outbound frame rates, persistence flush latency, login funnel throughput, GC pauses, session counts, and more. A dedicated metrics HTTP endpoint serves them for scraping. Grafana dashboards visualize the data in real time. In split deployments, each engine and gateway has its own metrics port. The system uses Micrometer under the surface, so adding a new metric is a single line of code."
        choices:
          - text: "Back to the main topics."
            next: root

      # ─── Scaling ────────────────────────────────────────────────────────
      about_scaling:
        text: "Ah, the scaling story — my favourite chapter. The world was designed with a principle the old architects called 'scale the edge, protect the core.' The engine tick loop stays single-threaded and authoritative — no parallelism in game logic means no race conditions and no synchronization bugs. All the scaling happens at the edges: transport, persistence, inter-process communication. This was built in six phases over time, each one adding a new capability without breaking what came before."
        choices:
          - text: "Tell me about the six scaling phases."
            next: scaling_phases
          - text: "What were the load test results?"
            next: about_load_tests
          - text: "What are the current bottlenecks?"
            next: about_bottlenecks
          - text: "What are the scaling tradeoffs?"
            next: about_tradeoffs
          - text: "Back to the main topics."
            next: root

      scaling_phases:
        text: "Phase One introduced the event bus abstraction — clean interfaces replacing raw channels, creating the seam where local transport could later be swapped for remote. Phase Two added the async persistence worker with write-coalescing, decoupling engine tick latency from disk writes. Phase Three brought Redis as optional cache and pub/sub. Phase Four split the runtime into Engine and Gateway over gRPC for horizontal session ingress. Phase Five implemented zone-based engine sharding with handoff, inter-engine messaging, and zone instancing. Phase Six delivered the full production cloud infrastructure on AWS. Each phase was an incremental addition — Standalone mode kept working at every step."
        choices:
          - text: "What were the load test results?"
            next: about_load_tests
          - text: "What are the current bottlenecks?"
            next: about_bottlenecks
          - text: "Back to the main topics."
            next: root

      about_load_tests:
        text: "Two formal load tests were conducted against a single Standalone instance. The first sustained seventy concurrent players with engine tick p99 under four milliseconds against a hundred-millisecond budget — zero tick overruns, forty megabytes of heap, under one percent CPU. The second pushed to a hundred and fifty concurrent players. Tick p99 spiked to fifteen milliseconds during the initial login burst, then settled to three milliseconds steady-state. Brief tick overruns appeared during ramp — about two hundredths per second — then vanished. Eight hundred outbound frames per second at peak. Forty megabytes heap. Two percent CPU. All one hundred fifty players logged in cleanly."
        choices:
          - text: "What about the login funnel?"
            next: about_login_funnel
          - text: "What are the current bottlenecks?"
            next: about_bottlenecks
          - text: "Back to the main topics."
            next: root

      about_login_funnel:
        text: "The login path has its own tunable limits. A semaphore caps how many sessions can simultaneously be in the name-lookup, password-hash, world-entry funnel — a hundred and fifty by default. Beyond that, new arrivals get an immediate 'server busy' message rather than silently timing out. Password hashing uses BCrypt on a dedicated thread pool — eight threads by default — isolated from normal I/O so that a login storm can't starve socket handling. At cost-ten BCrypt, sustained throughput is roughly thirty to eighty logins per second. At that rate, a hundred fifty simultaneous connections clear the funnel in two to five seconds."
        choices:
          - text: "What are the current bottlenecks?"
            next: about_bottlenecks
          - text: "Back to the main topics."
            next: root

      about_bottlenecks:
        text: "The clearest pressure point today is the regen subsystem — unlike combat, which caps processing per tick, regen iterates every active player unconditionally. At a hundred fifty players it consumed about three milliseconds per tick. Still comfortable against the hundred-millisecond budget, but it will grow linearly. The login burst spike is noticeable but transient. Outbound backpressure correctly sheds slow WebSocket clients during peak combat — a handful of disconnects per second, by design. Persistence flush latency doubles from a hundred fifty to three hundred milliseconds at higher player counts, but it's off the critical path. GC pressure trends upward but remains sub-millisecond."
        choices:
          - text: "What are the scaling tradeoffs?"
            next: about_tradeoffs
          - text: "Back to the main topics."
            next: root

      about_tradeoffs:
        text: "Every design has tradeoffs, and the architects were honest about theirs. First: determinism over raw parallelism — single-threaded game logic means fewer bugs but finite tick budget per engine shard. Second: eventual persistence over sync-on-every-change — write-behind batching gives lower tick jitter at the cost of a bounded durability window on crash. Third: optional infrastructure — Redis and PostgreSQL are feature flags, not requirements, which keeps small deployments lightweight but adds conditional wiring complexity. Fourth: edge scaling first — gateways and sharding came before engine parallelism, giving practical horizontal scale while keeping the core simple."
        choices:
          - text: "Tell me about the six scaling phases."
            next: scaling_phases
          - text: "Back to the main topics."
            next: root

      # ─── Configuration ──────────────────────────────────────────────────
      about_config:
        text: "Almost everything in this world is configurable without changing the engine itself. The master configuration — what the scholars call 'application.yaml' — governs every aspect of the system. I could spend days walking you through it. What area interests you?"
        choices:
          - text: "Server and network settings."
            next: config_server
          - text: "Combat and ability tuning."
            next: config_combat
          - text: "Mob tiers and spawn rules."
            next: config_mobs
          - text: "Persistence and database options."
            next: config_persistence
          - text: "World content — the YAML zone format."
            next: config_world
          - text: "Runtime overrides and hot-reload."
            next: config_runtime
          - text: "Back to the main topics."
            next: root

      config_server:
        text: "Telnet port, WebSocket port, deployment mode, gRPC settings, metrics port — all configurable. The sharding section defines engine IDs, zone assignments, registry type, handoff timeouts, and instance scaling thresholds. Redis connection, Postgres connection, thread pool sizes — all in the same file. Login limits and BCrypt thread count too. You can even override any setting at runtime from the command line: pass '-Pconfig.ambonmud.server.telnetPort=5000' and it takes effect immediately."
        choices:
          - text: "Persistence and database options."
            next: config_persistence
          - text: "Back to configuration topics."
            next: about_config

      config_combat:
        text: "The combat section tunes tick intervals, max combats per tick to prevent tick starvation, damage formulas, dodge calculations, XP curves, death penalties. Ability definitions live in the same config — each spell's damage, mana cost, cooldown, status effects, class restriction, and level requirement. Status effect definitions too: effect type, duration, tick interval, magnitude, stacking rules. The entire ability and effect system is data-driven — new spells and effects are added as configuration entries."
        choices:
          - text: "Mob tiers and spawn rules."
            next: config_mobs
          - text: "Back to configuration topics."
            next: about_config

      config_mobs:
        text: "Mob tiers — weak, standard, elite, and boss — define base HP, damage, armor, XP reward, and gold drop ranges, all with per-level scaling formulas. Per-mob overrides in zone YAML can replace any computed value. Behavior trees assign AI patterns: guards, patrollers, wanderers, cowards, aggressive variants. Respawn timers work per-mob or per-zone. Drop tables define item chances. Every number is tunable — raise boss HP, increase gold drops, adjust the XP curve — all without touching the engine."
        choices:
          - text: "Combat and ability tuning."
            next: config_combat
          - text: "Back to configuration topics."
            next: about_config

      config_persistence:
        text: "A single flag — 'persistence.backend' — switches between YAML flat files and PostgreSQL. YAML uses atomic writes: data goes to a temporary file first, then replaces the original. Zero dependencies, perfect for development. PostgreSQL uses Flyway-managed migrations — twenty-six migration scripts bring the schema from empty to current. Redis sits in front as an optional L2 cache with graceful degradation — if Redis goes away, the system keeps running from the primary store. Write coalescing and flush intervals are configurable too."
        choices:
          - text: "Runtime overrides and hot-reload."
            next: config_runtime
          - text: "Back to configuration topics."
            next: about_config

      config_world:
        text: "The zone YAML format is a complete contract. Each file declares a zone name, start room, optional lifespan, and then maps of rooms, mobs, items, shops, trainers, gathering nodes, and recipes. Rooms have titles, descriptions, exits, optional crafting stations, and optional images. Mobs have names, tiers, levels, drops, dialogue trees, behavior trees, quests, faction affiliations. Items have display names, equipment slots, damage, armor, consumable properties, and enchantments. The world loader validates everything on startup — malformed YAML is caught before a single player connects."
        choices:
          - text: "Back to configuration topics."
            next: about_config

      config_runtime:
        text: "Any configuration value can be overridden at launch via command-line properties — no need to edit files. Change the telnet port, switch persistence backends, enable debug logging for a specific package, adjust combat tuning — all from the command line. Zone YAML changes take effect on the next server start. The world validates all content at boot time, so errors are caught early. For ongoing operation, Prometheus metrics let you observe the effects of tuning in real time."
        choices:
          - text: "Back to the main topics."
            next: root

      farewell:
        text: "Come back any time, adventurer. The Deep Record is always open to the curious. May your journeys be guided by understanding as much as by courage."

