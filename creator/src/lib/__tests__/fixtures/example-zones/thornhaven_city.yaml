        text: "Ah — a visitor. Welcome to the Chronicler's Archive. I am Tessara, keeper of the Deep Record. Most adventurers run straight for the dungeons, but you... you have the look of someone who wants to understand how things work. This archive contains everything I've learned about the fabric of our world — its structure, its rules, and the forces that hold it together. What would you like to know?"
