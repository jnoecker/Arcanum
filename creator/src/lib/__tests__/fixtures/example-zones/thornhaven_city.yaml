# ─── Rooms ────────────────────────────────────────────────────────────────────

rooms:
  new_arrivals_hall:
    title: "New Arrivals Hall"
    description: "A vaulted stone hall with high arched windows and the smell of fresh bread drifting in from somewhere nearby. A notice board on the wall is pinned with maps, wanted posters, and a cheerful message: 'Welcome to Thornhaven — the last stop before adventure.' A clerk waves new arrivals toward the great iron doors to the south, which open onto the city."
    exits:
      s: city_center
      n: north_gate

  north_gate:
    title: "Thornhaven — North Gate"
    description: "The north gate of Thornhaven stands open day and night, its ironwood doors worn smooth by centuries of traffic. The road north winds uphill through rolling country before disappearing into the distance. A bored-looking guard leans against the arch. A beaten footpath curves east toward the Thornwood treeline. The city lies to the south."
    exits:
      s: new_arrivals_hall
      n: crossroads_path:world_road_south
      e: thornwood_forest:forest_road

  city_center:
    title: "City Center"
    description: "The beating heart of Thornhaven: a broad cobblestone plaza where half a dozen streets converge. A central fountain burbles steadily, its basin cluttered with coin offerings. Merchants, adventurers, and city folk jostle past in every direction. The smell of roasting meat and forge smoke hangs in the air. A carved stone archway to the northeast leads to the Chronicler's Archive."
    exits:
      n: new_arrivals_hall
      e: east_district
      w: west_district
      s: south_square
      u: chroniclers_archive

  chroniclers_archive:
    title: "The Chronicler's Archive"
    description: "A circular chamber of pale stone and warm lamplight, lined floor to ceiling with books, scrolls, and clockwork models of arcane mechanisms. Crystalline orreries rotate slowly overhead, tracing patterns that seem to map something larger than mere stars. At the center, an elderly woman sits at an enormous desk strewn with diagrams and open tomes. A brass plaque on the desk reads: 'Archivist Tessara — Keeper of the Deep Record.' The city center lies back through the archway below."
    exits:
      d: city_center

  east_district:
    title: "East District"
    description: "A quieter street lined with civic buildings. The bank's stone facade stands to the north, its polished brass sign catching the light. The crafting quarter's chimneys puff lazy smoke to the east. Trade Row with its shops and auction hall lies to the south. The city center is back to the west."
    exits:
      w: city_center
      n: thornhaven_bank
      e: crafting_quarter
      s: trade_row

  west_district:
    title: "West District"
    description: "A warm, lamp-lit lane leading to the inn district. The Tarnished Flagon's hanging sign creaks overhead to the north, and the guild registry's carved oak door stands to the west. The Trainers' Hall is through the archway to the south. The city center lies east."
    exits:
      e: city_center
      n: tarnished_flagon_inn
      w: guild_registry
      s: trainers_hall

  south_square:
    title: "South Square"
    description: "A wide open space at the southern end of the city. The arena district's stone walls and crowd noise are audible to the east. A narrow alley leads south toward the post office and Old Grimly's study. Trophy Hall's carved stone facade stands to the west. A rusted iron grate in the cobblestones below leads to the old tunnels beneath the city."
    exits:
      n: city_center
      e: arena_district
      s: post_office
      w: trophy_hall
      d: lower_city_alley

  trade_row:
    title: "Trade Row"
    description: "A bustling commercial street south of the east district. Stalls and storefronts compete for attention: the general store's open front glows warmly to the north, and the auction hall's bright lanterns draw a steady crowd to the east. The south gate arch leads out to the farming fields beyond the city wall."
    exits:
      n: east_district
      w: general_store
      e: auction_hall
      s: farmer_fields:north_fields

  tarnished_flagon_inn:
    title: "The Tarnished Flagon Inn"
    description: "A low-beamed common room with mismatched chairs and a crackling hearthfire. Dried herbs hang from the rafters and the smell of wood smoke and barley fills the air. Innkeeper Mira stands behind the bar with a ready smile. A faded sign reads: 'Set your recall here — this hearth is always burning.' The door leads back to the west district."
    bank: true
    tavern: true
    exits:
      s: west_district

  thornhaven_bank:
    title: "Thornhaven Bank"
    description: "A hushed chamber of polished marble and iron grillwork. Tellers work behind heavy brass bars, and a perpetual low hum suggests coin changing hands somewhere out of sight. Banker Theron nods in professional greeting from behind the main counter. The east district is through the south door."
    bank: true
    exits:
      s: east_district

  guild_registry:
    title: "Guild Registry"
    description: "A formal chamber with shelves of leather-bound ledgers and guild charters behind glass. The guild registrar, Edda, looks up from her desk with practiced efficiency. The west district is through the door to the east."
    exits:
      e: west_district

  general_store:
    title: "Dolvan's General Supplies"
    description: "A cramped but well-organized shop with gear hanging from every hook and shelf. Swords, staves, bows, and potions crowd the narrow aisles. Dolvan the Merchant stands behind a wooden counter, ready to haggle. Type 'list' to see available wares."
    exits:
      e: trade_row

  auction_hall:
    title: "Thornhaven Auction Hall"
    description: "A high-vaulted hall with tiered benches and a raised podium where Auctioneer Brant holds court. Chalk boards list current lots. The clamour of competitive bidding fills the room. The east arch opens onto the cobblestone road that runs away from the city. Type 'auction list' to browse current listings."
    exits:
      w: trade_row
      e: cobblestone_road:west_junction

  post_office:
    title: "Post Office"
    description: "A tidy stone room with pigeonhole shelving covering every wall. Mail Clerk Oswin moves between the racks with practiced efficiency, sorting letters with a speed that suggests decades of practice. 'mail list' to check your inbox."
    exits:
      n: south_square
      s: grimlys_study

  trophy_hall:
    title: "Trophy Hall"
    description: "A solemn hall with torches casting warm light on bronze plaques and glass cases. The names of Eryndal's greatest champions are inscribed in stone, and a perpetual scroll of leaderboard standings updates itself by some enchantment at the far end. Type 'leaderboard' or 'halloffame' to see who stands tallest."
    exits:
      e: south_square

  grimlys_study:
    title: "Old Grimly's Study"
    description: "A cramped, aromatic room thick with candle smoke and the smell of old maps. Rolled charts spill off every surface, pinned with cryptic notations. Old Grimly himself occupies a threadbare armchair, surrounded by papers and the faint odor of adventure. Type 'dungeon enter dungeon_of_echoes' to descend into the Dungeon of Echoes."
    exits:
      n: post_office

  # ─── Trainers' Hall wing ─────────────────────────────────────────────────

  trainers_hall:
    title: "Trainers' Hall"
    description: "A wide corridor carved from pale stone, lined with five arched doorways. Each doorway bears a carved emblem: sword, staff, crook, blade, and bow. This is where Thornhaven's finest teachers receive their students. The west district is back through the main entrance to the north."
    exits:
      n: west_district
      e: warrior_training_hall
      w: cleric_chapel
      s: mage_library
      u: rogue_den
      d: ranger_outpost

  warrior_training_hall:
    title: "Warrior Training Hall"
    description: "A broad practice floor of packed earth, lined with weapons racks and training dummies scarred by countless blows. Banners depicting crossed swords hang from the beams. Captain Varek stands at the far end, arms crossed, watching with appraising eyes."
    exits:
      w: trainers_hall

  mage_library:
    title: "The Arcane Library"
    description: "Floor-to-ceiling shelves of spellbooks and scrolls, dimly lit by hovering orbs of pale blue light. The air smells of ozone and dusty paper. Archmage Solen stands at a reading lectern, a tome open before him, though his eyes are already on you."
    exits:
      n: trainers_hall

  cleric_chapel:
    title: "Chapel of the Divine Light"
    description: "A serene room with high windows that fill it with warm afternoon light regardless of the hour. Stone benches face a simple altar bearing a chalice and a candle. High Priest Aldric kneels in brief prayer before rising to greet you."
    exits:
      e: trainers_hall

  rogue_den:
    title: "The Hidden Den"
    description: "A low-ceilinged room accessible only through a recessed doorway disguised as a bookshelf. The lighting is deliberately poor, the shadows deliberate. A figure leans against the far wall — Shadow, known only as Shade — watching you with unreadable eyes."
    exits:
      d: trainers_hall

  ranger_outpost:
    title: "Ranger's Outpost"
    description: "A functional, unpretentious room that smells of pine resin and leather. Maps of the Thornwood and surrounding wilds cover one wall. Tracking tools and hunting equipment hang in neat rows. Forester Lenna stands at the map table, marking something with a grease pencil."
    exits:
      u: trainers_hall

  # ─── Crafting Quarter ────────────────────────────────────────────────────

  crafting_quarter:
    title: "Crafting Quarter"
    description: "A bustling workshop district where the clang of hammers and the hiss of boiling alchemical reagents fill the air. Three specialist rooms branch off a central hub: the forge to the north, the alchemy lab to the east, and the tailor's workbench to the west. Sylva the Recipe Merchant holds court in the center, her satchel bulging with scrolls."
    exits:
      w: east_district
      n: forge_room
      e: alchemy_lab
      s: tailors_workbench

  forge_room:
    title: "The Forge"
    description: "A sweltering room dominated by a roaring stone forge and a wide anvil scarred by countless blows. Coal bins line one wall, tool racks the other. The heat is intense but the crafting opportunities are unparalleled. Type 'craft <recipe>' here to smith metal goods."
    station: FORGE
    exits:
      s: crafting_quarter

  alchemy_lab:
    title: "Alchemy Laboratory"
    description: "A cool, well-lit room with long stone benches covered in glass apparatus, bubbling retorts, and neatly labelled jars. The smell is complicated: part herb garden, part chemistry. This is where potions and salves are made. Type 'craft <recipe>' here to brew alchemical concoctions."
    station: ALCHEMY_TABLE
    exits:
      w: crafting_quarter

  tailors_workbench:
    title: "Tailor's Workbench"
    description: "A bright, airy room with wide windows and a long central workbench covered in bolts of cloth, spools of thread, and half-finished garments. A tailor's dummy stands in the corner wearing something ambitious. Type 'craft <recipe>' here for leatherwork and cloth goods."
    station: WORKBENCH
    exits:
      n: crafting_quarter

  # ─── Arena District ───────────────────────────────────────────────────────

  arena_district:
    title: "Arena District"
    description: "An open courtyard of stamped earth bordered by tiered stone spectator benches. The Arena Master stands near the center, ready to officiate any duel. The air has the electric quality of a crowd waiting for a show. Challenge another player with 'duel challenge <name>'."
    exits:
      w: south_square
      s: dueling_grounds

  dueling_grounds:
    title: "Dueling Grounds"
    description: "The arena's inner pit: a circular earthen floor chalked with a dueling circle and surrounded by a low wooden rail. Whatever happens here stays here — the Arena Master's rules prohibit unsanctioned violence. North leads back to the district entrance."
    exits:
      n: arena_district

  lower_city_alley:
    title: "Lower City Alley"
    description: "A narrow service passage beneath the south square, dimly lit by a single torch mounted in a corroded bracket. The walls are old stone — much older than the buildings above — and the air smells of damp earth. A heavy iron grate in the floor has been recently forced open, revealing a rusted ladder descending into the sewer tunnels below. The south square is back above."
    exits:
      u: south_square
      d: thornhaven_sewers:sewer_entrance
