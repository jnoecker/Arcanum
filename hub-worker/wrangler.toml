name = "arcanum-hub"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
# Keep the workers.dev preview URL enabled for smoke tests before the
# custom DNS routes resolve. The dev-fallback router in src/index.ts
# kicks in when the host doesn't match HUB_ROOT_DOMAIN.
workers_dev = true

# ─── Routes ──────────────────────────────────────────────────────────
# Production routing on the arcanum-hub.com zone. The Worker serves
# everything under arcanum-hub.com and its subdomains — the showcase
# SPA (via the ASSETS binding below), the publish + admin API on
# api.arcanum-hub.com, and the per-world /showcase.json + /images/*
# reads from R2.
#
# arcanum-hub.com is a dedicated apex, which means Cloudflare's free
# Universal SSL covers the apex + *.arcanum-hub.com out of the box —
# no Advanced Certificate Manager needed.

[[routes]]
pattern = "api.arcanum-hub.com/*"
zone_name = "arcanum-hub.com"

[[routes]]
pattern = "arcanum-hub.com/*"
zone_name = "arcanum-hub.com"

[[routes]]
pattern = "*.arcanum-hub.com/*"
zone_name = "arcanum-hub.com"

# ─── Assets (showcase SPA) ──────────────────────────────────────────
# Build the showcase first with
#   cd ../showcase && VITE_HUB_ROOT_DOMAIN=arcanum-hub.com npm run build
# then `wrangler deploy` uploads the resulting dist/ alongside the
# Worker. The SPA's own client-side routing is handled by the
# single-page-application fallback.

[assets]
directory = "../showcase/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# The Worker has to inspect the Host header and intercept specific
# paths (/api/*, /showcase.json, /images/*) before static assets are
# served — otherwise those paths would be absorbed by the SPA
# fallback and the API would be unreachable.
run_worker_first = true

# ─── Bindings ────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "arcanum-hub"
database_id = "1dc58d0f-0a64-4ef3-8fc1-d32bdf49a7fd"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "arcanum-hub"

[vars]
# The root domain that subdomains hang off of. Used to extract the
# world slug from the Host header: "<slug>.arcanum-hub.com" → "slug".
HUB_ROOT_DOMAIN = "arcanum-hub.com"
# Public origins of the admin SPA — comma-separated CORS allowlist.
# The admin dashboard can be reached at the nice URL once admin. is
# wired up as a Pages custom domain, and at the pages.dev fallback
# either way.
ADMIN_ORIGIN = "https://admin.arcanum-hub.com,https://arcanum-hub-admin.pages.dev"
# Sender address for verification-code emails. Must be on a domain
# that's verified in the Resend console.
FROM_EMAIL = "Arcanum Hub <no-reply@arcanum-hub.com>"
# Public Turnstile site key — safe to ship. Leave empty to disable
# Turnstile verification (useful in dev).
TURNSTILE_SITE_KEY = ""

# Secrets (set with `wrangler secret put`):
#   HUB_ADMIN_KEY          — master key for admin dashboard login
#   RESEND_API_KEY         — transactional email (https://resend.com)
#   TURNSTILE_SECRET_KEY   — CF Turnstile secret; pair with the public
#                            site key in [vars]. Leave unset to skip
#                            Turnstile verification.
