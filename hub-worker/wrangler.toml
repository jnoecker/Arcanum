name = "arcanum-hub"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
# Keep the workers.dev preview URL enabled for smoke tests before the
# custom DNS routes resolve. The dev-fallback router in src/index.ts
# kicks in when the host doesn't match HUB_ROOT_DOMAIN.
workers_dev = true

# ─── Routes ──────────────────────────────────────────────────────────
# Production routing on the ambon.dev zone. The Worker serves
# everything under arcanum.ambon.dev and its subdomains — the showcase
# SPA (via the ASSETS binding below), the publish + admin API on the
# api. subdomain, and the per-world /showcase.json + /images/* reads
# from R2.
#
# Cloudflare Pages rejects wildcard custom domains, so we do all the
# SPA serving from the Worker itself via an [assets] binding pointed
# at ../showcase/dist. The hub-admin Pages project stays as-is.

[[routes]]
pattern = "api.arcanum.ambon.dev/*"
zone_name = "ambon.dev"

[[routes]]
pattern = "arcanum.ambon.dev/*"
zone_name = "ambon.dev"

[[routes]]
pattern = "*.arcanum.ambon.dev/*"
zone_name = "ambon.dev"

# ─── Assets (showcase SPA) ──────────────────────────────────────────
# Build the showcase first with
#   cd ../showcase && VITE_HUB_ROOT_DOMAIN=arcanum.ambon.dev npm run build
# then `wrangler deploy` uploads the resulting dist/ alongside the
# Worker. The SPA's own client-side routing is handled by the
# single-page-application fallback.

[assets]
directory = "../showcase/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# The Worker has to inspect the Host header and intercept specific
# paths (/api/*, /showcase.json, /images/*) before static assets are
# served — otherwise those paths would be absorbed by the SPA
# fallback and the API would be unreachable.
run_worker_first = true

# ─── Bindings ────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "arcanum-hub"
database_id = "1dc58d0f-0a64-4ef3-8fc1-d32bdf49a7fd"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "arcanum-hub"

[vars]
# The root domain that subdomains hang off of. Used to extract the
# world slug from the Host header: "<slug>.arcanum.ambon.dev" → "slug".
HUB_ROOT_DOMAIN = "arcanum.ambon.dev"
# Public origin of the admin SPA — used for CORS allowlist.
ADMIN_ORIGIN = "https://arcanum-hub-admin.pages.dev"

# Secrets (set with `wrangler secret put`):
#   HUB_ADMIN_KEY   — master key for admin dashboard login
