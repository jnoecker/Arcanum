ambonmud:
  mode: STANDALONE

  # Base URLs for media assets. Override with a full CDN/R2 URL for cloud deployments,
  # e.g. https://pub-xxx.r2.dev/images/ — trailing slash is optional.
  #images:
  #  baseUrl: /images/
  #videos:
  #  baseUrl: /videos/
  #audio:
  #  baseUrl: /audio/

  sharding:
    enabled: false
    engineId: engine-1
    zones: []
    advertiseHost: localhost
    # Optional explicit advertised port override. When omitted, the server
    # uses mode-specific defaults (ENGINE=grpc.server.port, STANDALONE=telnetPort).
    #advertisePort: 9090
    registry:
      # STATIC (default) or REDIS
      type: STATIC
      leaseTtlSeconds: 30
      # Optional static assignments used when type=STATIC. If empty, sharded
      # engines only know their own local zone ownership.
      assignments: []
      #assignments:
      #  - engineId: engine-1
      #    host: localhost
      #    port: 9091
      #    zones: [crossroads_path, thornhaven_city, thornwood_forest]
      #  - engineId: engine-2
      #    host: localhost
      #    port: 9092
      #    zones: [sea_cliffs, sunken_temple, ruined_fortress]
    handoff:
      ackTimeoutMs: 2000
    # Redis player-location index for O(1) cross-engine tell routing.
    # Requires sharding.enabled=true and redis.enabled=true.
    playerIndex:
      enabled: false
      heartbeatMs: 10000
    # Zone instancing (layering). When enabled, multiple engines may host
    # copies of the same zone. Players on different instances cannot see each
    # other in rooms but can still use tell, gossip, and who.
    instancing:
      enabled: false
      defaultCapacity: 200
      loadReportIntervalMs: 5000
      startZoneMinInstances: 1
      autoScale:
        enabled: false
        evaluationIntervalMs: 30000
        scaleUpThreshold: 0.8
        scaleDownThreshold: 0.2
        cooldownMs: 60000

  grpc:
    server:
      port: 9090
    client:
      engineHost: localhost
      enginePort: 9090
    sharedSecret: ""
    allowPlaintext: true
    timestampToleranceMs: 30000

  gateway:
    id: 0
    snowflake:
      idLeaseTtlSeconds: 300
    reconnect:
      maxAttempts: 10
      initialDelayMs: 1000
      maxDelayMs: 30000
      jitterFactor: 0.2
      streamVerifyMs: 2000
    # Multi-engine mode: when engines list is non-empty, the gateway connects
    # to all listed engines and uses SessionRouter for session-to-engine routing.
    # Leave empty for single-engine mode (uses grpc.client config instead).
    startZone: ""
    engines: []
    #engines:
    #  - id: engine-1
    #    host: localhost
    #    port: 9091
    #  - id: engine-2
    #    host: localhost
    #    port: 9092

  server:
    telnetPort: 4000
    webPort: 8080
    inboundChannelCapacity: 10000
    outboundChannelCapacity: 10000
    sessionOutboundQueueCapacity: 200
    maxInboundEventsPerTick: 1000
    tickMillis: 100
    inboundBudgetMs: 30
    # Set to true in production to reject placeholder secrets at startup.
    productionMode: false

  world:
    startRoom: "thornhaven_city:new_arrivals_hall"
    resources: []

  persistence:
    backend: YAML
    rootDir: data/players
    worker:
      enabled: true
      flushIntervalMs: 5000

  database:
    jdbcUrl: "jdbc:postgresql://localhost:5432/ambonmud"
    username: ambon
    password: changeme  # Override via AMBONMUD_DATABASE_PASSWORD env var in production
    maxPoolSize: 5
    minimumIdle: 1

  login:
    maxWrongPasswordRetries: 3
    maxFailedAttemptsBeforeDisconnect: 3
    # Maximum sessions simultaneously in the auth funnel (name lookup → BCrypt → world entry).
    # Sessions beyond this limit receive an immediate "server busy" message rather than timing out.
    maxConcurrentLogins: 150
    # Thread-pool size for BCrypt hashing, isolated from Dispatchers.IO to avoid starving socket I/O.
    # Defaults to availableProcessors at runtime if not set; tune based on measured BCrypt throughput.
    authThreads: 8

  engine:
    navigation:
      recall:
        cooldownMs: 300000
        messages:
          combatBlocked: You are fighting for your life...
          cooldownRemaining: You need to rest... ({seconds} seconds remaining)
          castBegin: You close your eyes and whisper a prayer...
          unreachable: Your recall point is unreachable.
          departNotice: vanishes in a flash of light.
          arriveNotice: appears in a flash of light.
          arrival: You feel a familiar warmth...
    mob:
      minActionDelayMillis: 8000
      maxActionDelayMillis: 20000
      tiers:
        weak:
          baseHp: 5
          hpPerLevel: 2
          baseMinDamage: 1
          baseMaxDamage: 2
