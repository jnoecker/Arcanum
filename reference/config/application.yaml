  progression:
    maxLevel: 50
    xp:
      baseXp: 100
      exponent: 2.0
      linearXp: 0
      multiplier: 1.0
      defaultKillXp: 50
    rewards:
      hpPerLevel: 2
      manaPerLevel: 5
      fullHealOnLevelUp: true
      fullManaOnLevelUp: true
      baseHp: 10
      baseMana: 20

  transport:
    telnet:
      maxLineLen: 1024
      maxNonPrintablePerLine: 32
      # OS-level TCP accept backlog (JVM default is 50; raise to absorb burst connection storms).
      socketBacklog: 256
    websocket:
      host: 0.0.0.0
      stopGraceMillis: 1000
      stopTimeoutMillis: 2000
    maxInboundBackpressureFailures: 3

  demo:
    autoLaunchBrowser: false
    webClientHost: localhost
    webClientUrl: ~

  observability:
    metricsEnabled: true
    metricsEndpoint: "/metrics"
    metricsHttpPort: 9099
    metricsHttpHost: "0.0.0.0"
    staticTags: {}

  admin:
    enabled: false
    port: 9091
    # token must be non-blank when enabled=true
    token: ""
    # Optional Grafana URL shown as a link on the overview page
    grafanaUrl: ""
    # Allowed CORS origins for external tools (e.g. Arcanum). Empty list disables CORS.
    corsOrigins: []
    # Base path for HTML links when served behind a reverse proxy (e.g. "/admin/"). Must end with "/".
    basePath: "/"

  logging:
    level: INFO
    packageLevels:
      dev.ambon.transport: INFO
      dev.ambon.engine: INFO

  redis:
    enabled: false
    uri: "redis://localhost:6379"
    cacheTtlSeconds: 3600
    bus:
      enabled: false
      inboundChannel: ambon:inbound
      outboundChannel: ambon:outbound
      instanceId: ""
      sharedSecret: "CHANGE_ME"
